name: Build Flixify APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build APK with EAS
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK from EAS
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0].get('artifacts',{}).get('buildUrl',''))" 2>/dev/null || echo "")
          if [ -n "$BUILD_URL" ]; then
            curl -L "$BUILD_URL" -o flixify-release.apk
            echo "APK downloaded: $BUILD_URL"
          else
            echo "APK URL not found - check expo.dev/builds manually"
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flixify-APK-${{ github.sha }}
          path: "*.apk"
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
          name: "Flixify ${{ github.ref_name }}"
          body: "APK download করুন এবং Android-এ install করুন। Install করতে Unknown sources চালু রাখুন।"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
