name: Build Flixify APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger button in GitHub

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      # ─── 1. Checkout code ───────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Setup Node.js (no cache — no lock file in repo) ──────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm' removed — requires package-lock.json

      # ─── 3. Setup Java (required for Android build) ──────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ─── 4. Install EAS CLI ──────────────────────────────────────
      - name: 🛠️ Install EAS CLI
        run: |
          npm install -g @expo/eas-cli
          echo "EAS CLI version: $(eas --version)"

      # ─── 5. Install project dependencies ─────────────────────────
      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      # ─── 6. Build APK using EAS (cloud build) ────────────────────
      - name: 🏗️ Build APK with EAS
        run: |
          eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ─── 7. Download the built APK from EAS ──────────────────────
      - name: 📲 Download APK from EAS
        run: |
          BUILD_URL=$(eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --json \
            --non-interactive \
            2>/dev/null \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
url = data[0].get('artifacts', {}).get('buildUrl', '')
print(url)
" 2>/dev/null || echo "")

          if [ -n "$BUILD_URL" ]; then
            echo "APK URL: $BUILD_URL"
            curl -L "$BUILD_URL" -o flixify-release.apk
            echo "APK downloaded successfully"
          else
            echo "Could not fetch APK URL — download from expo.dev/builds manually"
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ─── 8. Upload APK as GitHub Artifact ────────────────────────
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flixify-APK-${{ github.sha }}
          path: "*.apk"
          retention-days: 30
          if-no-files-found: warn

      # ─── 9. Create GitHub Release (only on version tags) ─────────
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
          name: "Flixify ${{ github.ref_name }}"
          body: |
            ## Flixify App ${{ github.ref_name }}
            APK download করুন এবং Android-এ install করুন।
            Install করতে "Unknown sources" চালু রাখুন।
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
