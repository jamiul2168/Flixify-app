name: Build MovieDen APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/release/app-release.apk output/MovieDen-${{ github.ref_name || 'latest' }}.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieDen-APK-${{ github.sha }}
          path: output/*.apk
          retention-days: 30

      - name: Create GitHub Release (tag push এ)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.apk
          name: "MovieDen ${{ github.ref_name }}"
          body: |
            ## MovieDen ${{ github.ref_name }}

            👇 নিচে থেকে APK download করুন এবং Android এ install করুন।

            > যদি আগের version install করা থাকে, আগে uninstall করুন তারপর install করুন।
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
